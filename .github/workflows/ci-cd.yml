name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "training_data.csv"
      - "train_model.py"
      - "requirements.txt"
      - ".github/workflows/ci-cd.yml"

  pull_request:
    branches:
      - main
    paths:
      - "training_data.csv"
      - "train_model.py"
      - "requirements.txt"
      - ".github/workflows/ci-cd.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Train Linear Model
        run: |
          python train_model.py

      - name: Save model file temporarily
        if: github.event_name == 'push'
        run: |
          cp linear_model.txt /tmp/linear_model.txt

      - name: Push linear_model.txt to release branch
        if: github.event_name == 'push'
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          git checkout --orphan release-temp

          git rm -rf . || true

          cp /tmp/linear_model.txt linear_model.txt

          git add linear_model.txt
          git commit -m "Update linear model"

          git push -f origin release-temp:release

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.run_number }}"
          gh release create "$TAG" linear_model.txt \
            --title "Release $TAG" \
            --notes "Automated release generated by CI/CD pipeline."
